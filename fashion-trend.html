<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>fashion/trend — dev (canvas + tweaks)</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="./src/styles/main.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #0a0a0a; }

  .ft-page-anim { animation: ftPageIn .45s cubic-bezier(.2,.8,.2,1); }
  @keyframes ftPageIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0);   }
  }

  /* Mode switch pill — dev only */
  .ft-mode-switch {
    position: fixed; top: 14px; right: 14px; z-index: 300;
    display: flex; gap: 4px;
    background: rgba(20,20,20,.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.1);
    padding: 4px; border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
  }
  .ft-mode-switch button {
    padding: 6px 14px; background: none; border: 0;
    color: rgba(255,255,255,.6);
    font-size: 11px; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    border-radius: 999px; cursor: pointer;
    transition: background .2s, color .2s;
  }
  .ft-mode-switch button.is-active { background: #ff1f6c; color: #fff; }
  .ft-mode-switch button:hover:not(.is-active) { color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
  integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
  integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"

  crossorigin="anonymous"></script>

<!-- Dev-only tools (canvas + tweaks) -->
